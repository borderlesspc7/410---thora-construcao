[variables]
PYTHONUNBUFFERED = "1"

[phases.setup]
nixPkgs = ["python311", "nodejs", "gcc"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r backend/requirements.txt",
  "npm install --prefix frontend"
]

[phases.build]
cmds = ["npm run build --prefix frontend"]

[start]
cmd = "cd backend && gunicorn -w 2 --timeout 600 --graceful-timeout 30 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT main:app"
