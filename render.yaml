services:
  - type: web
    name: four10-thora-construcao
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --timeout 600 --graceful-timeout 30 -b 0.0.0.0:$PORT -k uvicorn.workers.UvicornWorker main:app
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DETECT_TABLES_MAX_PAGES
        value: "10"
      - key: DISABLE_CAMELOT
        value: "true"
      - key: USE_CELERY_QUEUE
        value: "false"
      - key: FRONTEND_URL
        value: https://borderles-410.netlify.app
      - key: FRONTEND_URLS
        value: https://borderles-410.netlify.app,https://410-thora.netlify.app
      # Defina no painel do Render (Environment → Secret Files / env vars):
      # FIREBASE_CREDENTIALS, GEMINI_API_KEY, OPENAI_API_KEY (opcional)
